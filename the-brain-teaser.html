<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M12 2c4 0 7 3 7 7 0 3-2 4.5-3 6-.4.6-.5 1.2-.5 2H8.5c0-.8-.1-1.4-.5-2-1-1.5-3-3-3-6 0-4 3-7 7-7Z' fill='%23ffb43d'/%3E%3Crect x='9' y='19' width='6' height='2.4' rx='1.2' fill='%23ffb43d'/%3E%3C/svg%3E" />
<title>The Brain Teaser — reasoning games for curious minds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#171034; --night-2:#241a52; --panel:#2c2160; --panel-2:#372a72;
    --lantern:#ffb43d; --lantern-soft:#ffd98a; --glow:rgba(255,180,61,.5);
    --leaf:#34d39a; --sky:#4fb6ff; --berry:#ff6f9d; --clay:#ff8a5c; --grape:#b48cff;
    --good:#34d39a; --bad:#ff6f7d;
    --cloth:#f6efe1; --muted:#a99fd6; --line:rgba(255,255,255,.10);
    --disp:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--body); color:var(--cloth); min-height:100vh; -webkit-font-smoothing:antialiased;
    background:radial-gradient(1200px 600px at 80% -10%,#3a2a7a 0,transparent 55%),
      radial-gradient(900px 500px at 0% 110%,#2a1c5c 0,transparent 55%),var(--night);}
  .wrap{max-width:760px; margin:0 auto; padding:20px 16px 70px}
  button{font-family:var(--disp); cursor:pointer}
  .topbar{display:flex; align-items:center; gap:12px; margin-bottom:22px}
  .mark{width:40px;height:40px;flex:none;filter:drop-shadow(0 0 14px var(--glow))}
  .wm-title{font-family:var(--disp); font-weight:700; font-size:clamp(20px,3vw,26px); line-height:1}
  .wm-sub{color:var(--muted); font-size:13px; margin-top:2px}
  .crumbs{margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end}
  .crumb{background:transparent;border:1.5px solid var(--line);color:var(--cloth);border-radius:11px;padding:8px 13px;font-weight:600;font-size:13px}
  .crumb:hover{border-color:rgba(255,255,255,.3)}
  .hero{background:linear-gradient(180deg,var(--panel),transparent);border:1px solid var(--line);border-radius:22px;padding:24px;margin-bottom:22px}
  .hero h1{font-family:var(--disp);font-weight:700;font-size:clamp(22px,3.4vw,30px);margin:0 0 8px}
  .hero p{color:#e7e1f8;line-height:1.55;font-size:15.5px;margin:0;max-width:58ch}
  .disclaimer{margin-top:14px;font-size:12.5px;color:var(--muted);border-left:3px solid var(--line);padding-left:12px;line-height:1.5}
  .cards{display:grid;gap:16px}
  .two{grid-template-columns:1fr 1fr} .multi{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  @media(max-width:560px){.two{grid-template-columns:1fr}}
  .card{position:relative;text-align:left;border:1px solid var(--line);border-radius:20px;padding:20px;background:var(--night-2);
    overflow:hidden;transition:transform .14s,border-color .2s;color:var(--cloth)}
  .card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.22)}
  .card:before{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;
    background:radial-gradient(circle,var(--rc,var(--lantern)),transparent 70%);opacity:.3}
  .card .ic{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:24px;background:rgba(255,255,255,.08);margin-bottom:13px;position:relative}
  .card h3{font-family:var(--disp);font-weight:600;font-size:19px;margin:0 0 5px;position:relative}
  .card p{color:var(--muted);font-size:13px;line-height:1.5;margin:0;position:relative}
  .card .meta{margin-top:11px;font-size:12px;color:var(--rc,var(--lantern));font-weight:700;position:relative}
  .card.done-sub{border-color:rgba(255,180,61,.4)}

  .ladder{display:flex;flex-direction:column;gap:14px}
  .stage{position:relative;display:flex;align-items:center;gap:16px;background:var(--night-2);border:1px solid var(--line);
    border-radius:18px;padding:16px 18px;text-align:left;color:var(--cloth);transition:transform .14s,border-color .2s;width:100%}
  .stage.open:hover{transform:translateX(4px);border-color:rgba(255,255,255,.25)}
  .stage.locked{opacity:.5;filter:grayscale(.3);cursor:not-allowed}
  .stage.complete{border-color:rgba(255,180,61,.4)}
  .lnode{width:54px;height:54px;flex:none;border-radius:16px;display:grid;place-items:center;position:relative;background:rgba(255,255,255,.05)}
  .lnode svg{width:58%;height:58%;color:#5a5183;transition:.4s}
  .stage.lit .lnode svg{color:var(--lantern);filter:drop-shadow(0 0 10px var(--glow))}
  .stage.current .lnode{box-shadow:0 0 0 2px var(--lantern),0 0 18px -2px var(--glow)}
  .lnode .lock{position:absolute;font-size:18px}
  .sbody{flex:1;min-width:0}
  .sbody .gr{font-family:var(--disp);font-weight:600;font-size:18px}
  .sbody .age{font-size:12.5px;color:var(--muted);margin-top:1px}
  .pips{display:flex;gap:5px;margin-top:8px}
  .pips i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.14)}
  .pips i.on{background:var(--lantern);box-shadow:0 0 8px var(--glow)}
  .sstat{font-family:var(--disp);font-weight:700;font-size:13.5px;white-space:nowrap}
  .sstat.go{color:var(--lantern)} .sstat.done{color:var(--leaf)} .sstat.lock{color:var(--muted)}
  .note{font-size:12.5px;color:var(--muted);margin-top:16px;line-height:1.5;text-align:center}

  .qbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .qcount{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--muted);white-space:nowrap}
  .track{flex:1;height:9px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,var(--lantern),var(--lantern-soft));border-radius:999px;transition:width .3s}
  .qcard{background:var(--night-2);border:1px solid var(--line);border-radius:22px;padding:24px}
  .qtype{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--night);
    background:var(--lantern);padding:3px 10px;border-radius:999px;margin-bottom:14px}
  .qtext{font-family:var(--disp);font-weight:500;font-size:21px;line-height:1.4;margin:0 0 6px}
  .qvisual{font-size:38px;letter-spacing:8px;text-align:center;margin:18px 0 8px}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
  .opt{text-align:left;border:1.5px solid var(--line);background:rgba(0,0,0,.16);color:var(--cloth);border-radius:14px;
    padding:14px 16px;font-family:var(--disp);font-weight:500;font-size:16px;transition:.12s;display:flex;align-items:center;gap:10px}
  .opt:not(:disabled):hover{border-color:rgba(255,255,255,.3);transform:translateY(-1px)}
  .opt .key{width:26px;height:26px;flex:none;border-radius:8px;background:rgba(255,255,255,.1);display:grid;place-items:center;font-size:13px;font-weight:700}
  .opt.correct{border-color:var(--good);background:rgba(52,211,154,.14)} .opt.correct .key{background:var(--good);color:var(--night)}
  .opt.wrong{border-color:var(--bad);background:rgba(255,111,125,.12)} .opt.wrong .key{background:var(--bad);color:var(--night)}
  .opt:disabled{cursor:default}
  .explain{margin-top:16px;background:rgba(79,182,255,.08);border:1px solid rgba(79,182,255,.25);border-radius:14px;padding:14px 16px;font-size:14.5px;line-height:1.55}
  .explain .verdict{font-family:var(--disp);font-weight:700;font-size:15px;margin-bottom:4px}
  .explain .verdict.yes{color:var(--good)} .explain .verdict.no{color:var(--bad)}
  .qfoot{display:flex;margin-top:18px}
  .next{margin-left:auto;font-family:var(--disp);font-weight:700;font-size:16px;color:var(--night);background:var(--lantern);border:none;border-radius:13px;padding:12px 26px;box-shadow:0 4px 0 #b9802a}
  .next:active{transform:translateY(2px);box-shadow:0 2px 0 #b9802a}

  .res{background:var(--night-2);border:1px solid var(--line);border-radius:22px;padding:26px;text-align:center}
  .scorebig{font-family:var(--disp);font-weight:700;font-size:46px;line-height:1;margin:6px 0}
  .scorebig small{font-size:22px;color:var(--muted)}
  .restier{font-family:var(--disp);font-weight:600;font-size:20px;margin:8px 0 4px}
  .resmsg{color:#e7e1f8;font-size:15px;line-height:1.55;max-width:46ch;margin:0 auto 18px}
  .unlock{background:rgba(255,180,61,.1);border:1px solid rgba(255,180,61,.35);border-radius:14px;padding:13px 16px;margin:0 auto 16px;max-width:44ch;font-size:14px;font-family:var(--disp);font-weight:500;color:var(--lantern-soft)}
  .profile{text-align:left;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:6px 0 4px}
  .profile h4{font-family:var(--disp);font-weight:600;font-size:13px;margin:0 0 12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .prow{display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:14px}
  .prow .lbl{width:74px;font-weight:600}
  .pbar{flex:1;height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
  .pbar i{display:block;height:100%;border-radius:999px;transition:width .5s}
  .prow .pct{width:40px;text-align:right;color:var(--muted);font-size:13px}
  .resnote{font-size:12.5px;color:var(--muted);margin-top:16px;line-height:1.5}
  .resbtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px}
  .btn{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--night);background:var(--lantern);border:none;border-radius:13px;padding:12px 20px;box-shadow:0 4px 0 #b9802a}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 #b9802a}
  .btn.ghost{background:transparent;color:var(--cloth);border:1.5px solid var(--line);box-shadow:none;font-weight:600}
  .btn.ghost:hover{border-color:rgba(255,255,255,.3)}

  /* ---- topbar profile cluster ---- */
  .topbar{flex-wrap:wrap}
  .pcluster{display:flex;align-items:center;gap:10px;margin-left:auto}
  .iconbtn{width:38px;height:38px;border-radius:11px;border:1.5px solid var(--line);background:transparent;color:var(--cloth);font-size:16px;display:grid;place-items:center}
  .iconbtn:hover{border-color:rgba(255,255,255,.3)}
  .iconbtn.on{background:rgba(255,180,61,.15);border-color:rgba(255,180,61,.4)}
  .pchip{display:flex;align-items:center;gap:10px;background:var(--night-2);border:1px solid var(--line);border-radius:14px;padding:6px 12px 6px 8px;cursor:pointer}
  .pchip:hover{border-color:rgba(255,255,255,.25)}
  .pav{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:20px;background:rgba(255,255,255,.08);flex:none}
  .pmeta{min-width:0}
  .pname{font-family:var(--disp);font-weight:600;font-size:13.5px;line-height:1.1;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
  .plvl{font-size:10.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
  .xpbar{width:70px;height:6px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--lantern),var(--lantern-soft));border-radius:999px;transition:width .5s}

  /* ---- onboarding ---- */
  .avgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:12px;margin:6px 0 18px}
  .avpick{aspect-ratio:1/1;border-radius:16px;border:2px solid var(--line);background:rgba(255,255,255,.05);font-size:34px;display:grid;place-items:center}
  .avpick.on{border-color:var(--lantern);background:rgba(255,180,61,.12);box-shadow:0 0 16px -4px var(--glow)}
  .namein{width:100%;font-family:var(--disp);font-weight:500;font-size:17px;color:var(--cloth);background:rgba(0,0,0,.2);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;outline:none}
  .namein:focus{border-color:var(--lantern)}

  /* ---- daily card ---- */
  .daily{display:flex;align-items:center;gap:16px;background:linear-gradient(110deg,rgba(255,180,61,.14),var(--night-2));border:1px solid rgba(255,180,61,.3);border-radius:20px;padding:18px;margin-bottom:18px;width:100%;text-align:left;color:var(--cloth)}
  .daily:hover{border-color:rgba(255,180,61,.5)}
  .daily .dic{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:26px;background:rgba(255,180,61,.18);flex:none}
  .daily h3{font-family:var(--disp);font-weight:600;font-size:18px;margin:0 0 2px}
  .daily p{margin:0;color:var(--muted);font-size:13px}
  .daily .go{margin-left:auto;font-family:var(--disp);font-weight:700;color:var(--lantern);font-size:14px;white-space:nowrap}
  .daily.done{opacity:.75} .daily.done .go{color:var(--leaf)}

  /* ---- stars ---- */
  .stars{display:inline-flex;gap:2px;font-size:14px;line-height:1}
  .stars .s{color:rgba(255,255,255,.18)} .stars .s.on{color:var(--lantern);filter:drop-shadow(0 0 5px var(--glow))}
  .card .meta .stars{font-size:13px}

  /* ---- combo + timer in quiz ---- */
  .combo{display:inline-flex;align-items:center;gap:6px;font-family:var(--disp);font-weight:700;font-size:13px;color:var(--clay);
    background:rgba(255,138,92,.14);border:1px solid rgba(255,138,92,.35);border-radius:999px;padding:4px 11px;white-space:nowrap;animation:pop .25s}
  @keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
  .timer{height:7px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-bottom:14px}
  .timer i{display:block;height:100%;background:linear-gradient(90deg,var(--berry),var(--clay));width:100%;transition:width .25s linear}
  .timer.warn i{background:var(--bad)}

  /* ---- badges ---- */
  .bgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:4px}
  .badge{display:flex;gap:12px;align-items:center;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:16px;padding:14px}
  .badge.locked{opacity:.45;filter:grayscale(.5)}
  .badge .bic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:23px;background:rgba(255,180,61,.14);flex:none}
  .badge.locked .bic{background:rgba(255,255,255,.06)}
  .badge .bn{font-family:var(--disp);font-weight:600;font-size:14px}
  .badge .bd{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35}

  /* ---- modal (level up / badge) ---- */
  .modal{position:fixed;inset:0;background:rgba(10,6,28,.74);backdrop-filter:blur(4px);display:grid;place-items:center;z-index:90;padding:20px;opacity:0;pointer-events:none;transition:.25s}
  .modal.show{opacity:1;pointer-events:auto}
  .mcard{background:linear-gradient(180deg,var(--panel),var(--night-2));border:1px solid var(--line);border-radius:22px;padding:28px;max-width:380px;width:100%;text-align:center;transform:scale(.94);transition:.25s}
  .modal.show .mcard{transform:scale(1)}
  .mcard .big{font-size:54px;margin-bottom:8px;filter:drop-shadow(0 0 16px var(--glow))}
  .mcard h2{font-family:var(--disp);font-weight:700;font-size:24px;margin:0 0 6px}
  .mcard p{color:#e7e1f8;font-size:15px;line-height:1.5;margin:0 0 18px}

  /* ---- confetti ---- */
  #fx{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}
  .conf{position:absolute;width:10px;height:14px;border-radius:2px;will-change:transform,opacity}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:12px 18px;font-size:14px;font-family:var(--disp);font-weight:500;max-width:90vw;opacity:0;pointer-events:none;transition:.3s;z-index:95;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .ic{margin-right:4px}

  /* ---- affiliate / brain shelf ---- */
  .recwrap{margin-top:18px;text-align:left}
  .recwrap h4{font-family:var(--disp);font-weight:600;font-size:13px;margin:0 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .reclist{display:grid;gap:10px}
  .rec{display:flex;gap:12px;align-items:center;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:14px;padding:12px 14px;text-decoration:none;color:var(--cloth)}
  .rec:hover{border-color:rgba(255,255,255,.25)}
  .rec .remoji{font-size:24px;width:40px;text-align:center;flex:none}
  .rec .rmeta{min-width:0;flex:1}
  .rec .rt{font-family:var(--disp);font-weight:600;font-size:14.5px;line-height:1.2}
  .rec .rb{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
  .rec .rcta{margin-left:auto;font-family:var(--disp);font-weight:700;font-size:12.5px;color:var(--night);background:var(--lantern);border-radius:10px;padding:7px 12px;white-space:nowrap;flex:none}
  .disc{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.45;border-left:3px solid var(--line);padding-left:10px}
  .forgrownups{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--grape);margin-bottom:8px}
  .shelfgroup{margin-bottom:22px}
  .shelfgroup>.gh{font-family:var(--disp);font-weight:600;font-size:17px;margin:0 0 10px;display:flex;align-items:center;gap:8px}

  .matchcard{aspect-ratio:1/1;border-radius:14px;border:1px solid var(--line);background:#1d1547;font-size:26px;display:grid;place-items:center;cursor:pointer;transition:.15s}
  .matchcard.up{background:var(--panel-2)}
  .matchcard.done{background:rgba(52,211,154,.18);border-color:rgba(52,211,154,.4)}
  .simonpad{aspect-ratio:1.5/1;border:none;border-radius:16px;cursor:pointer;opacity:.5;transition:.12s}
  .simonpad.lit{opacity:1;box-shadow:0 0 26px -2px #fff;transform:scale(1.03)}
  .huntcell{aspect-ratio:1/1;border-radius:14px;border:1px solid var(--line);background:#1d1547;font-family:var(--disp);font-weight:700;font-size:24px;color:var(--cloth);cursor:pointer}
  .huntcell.done{background:rgba(52,211,154,.15);border-color:transparent;cursor:default;color:transparent}
  /* ---- reading club ---- */
  .bigemoji{font-size:84px;text-align:center;margin:6px 0 4px;line-height:1}
  .spk{display:inline-grid;place-items:center;width:48px;height:48px;border-radius:50%;background:var(--lantern);color:var(--night);font-size:22px;border:none;cursor:pointer;box-shadow:0 3px 0 #b9802a}
  .spk:active{transform:translateY(2px);box-shadow:0 1px 0 #b9802a}
  .slots{display:flex;gap:8px;justify-content:center;margin:16px 0;flex-wrap:wrap}
  .slot2{width:46px;height:54px;border-radius:12px;border:2px dashed var(--line);display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:26px;background:rgba(0,0,0,.18)}
  .slot2.filled{border-style:solid;border-color:var(--leaf);background:rgba(52,211,154,.12)}
  .tiles{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

const AVATARS=[{e:'🦊',lv:1},{e:'🦉',lv:1},{e:'🐢',lv:1},{e:'🐝',lv:2},{e:'🦋',lv:3},{e:'🐙',lv:4},{e:'🦄',lv:5},{e:'🐉',lv:7},{e:'🦅',lv:9},{e:'🐳',lv:12}];

const unlockedCount=lvl=>AVATARS.filter(a=>lvl>=a.lv).length;
const defaultProfile=()=>({name:'',avatar:'🦊',xp:0,badges:{},stars:{},unlocked:0,prof:{},daily:{},mind:{},seen:{},arcade:{},expBest:0,settings:{sound:true,timed:false}});
let P=defaultProfile();
const KEY='brainteaser_profile';
const Store={
  async load(){
    try{const ls=localStorage.getItem(KEY)||localStorage.getItem('tl_profile');if(ls)return JSON.parse(ls);}catch(e){}
    try{if(window.storage){const r=await window.storage.get(KEY);if(r&&r.value)return JSON.parse(r.value);}}catch(e){}
    return null;
  },
  save(){const data=JSON.stringify(P);
    try{localStorage.setItem(KEY,data);}catch(e){}
    try{if(window.storage)window.storage.set(KEY,data);}catch(e){}
  }
};

function starsFor(score,total){ if(score>=total)return 3; if(score/total>=PASS)return 2; if(score>0)return 1; return 0; }
const subjKey=(gi,sid)=>GRADES[gi].id+'.'+sid;
const subjStars=(gi,sid)=>P.stars[subjKey(gi,sid)]||0;
const subjLit=(gi,sid)=>subjStars(gi,sid)>=2;
const gradeComplete=gi=>SUBJECTS.every(s=>subjLit(gi,s.id));
const litCount=gi=>SUBJECTS.filter(s=>subjLit(gi,s.id)).length;
const MAX_STARS=GRADES.length*SUBJECTS.length*3;
const totalStars=()=>{let t=0;GRADES.forEach((g,i)=>SUBJECTS.forEach(su=>t+=Math.min(3,subjStars(i,su.id))));return t;};
const allGradesComplete=()=>GRADES.every((_,i)=>gradeComplete(i));

function drawSubset(arr,n,key){
  if(arr.length<=n)return shuffle(arr);
  P.seen=P.seen||{};let seen=Array.isArray(P.seen[key])?P.seen[key]:[];
  const idxs=arr.map((_,i)=>i);let unseen=idxs.filter(i=>!seen.includes(i));
  if(unseen.length<n){seen=[];unseen=idxs;}
  const chosen=shuffle(unseen).slice(0,n);
  P.seen[key]=Array.from(new Set(seen.concat(chosen)));Store.save();
  return shuffle(chosen.map(i=>arr[i]));
}

function dailyKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function buildDaily(){
  const all=[];GRADES.forEach(g=>SUBJECTS.forEach(s=>g.subjects[s.id].forEach(q=>all.push(q))));PROFESSIONS.forEach(p=>p.questions.forEach(q=>all.push(q)));
  let seed=0;for(const c of dailyKey())seed=(seed*31+c.charCodeAt(0))>>>0;seed=seed||1;
  const rng=()=>{seed=(seed*1664525+1013904223)>>>0;return seed/4294967296;};
  const idx=new Set();let guard=0;while(idx.size<5&&guard++<999)idx.add(Math.floor(rng()*all.length));
  return [...idx].map(i=>all[i]);
}

// ===================== MIND MAP RADAR =====================
function mindRadar(){
  const cx=110,cy=104,R=78,N=TYPES.length;
  const pt=(i,r)=>{const ang=-Math.PI/2+i*2*Math.PI/N;return[cx+Math.cos(ang)*r,cy+Math.sin(ang)*r];};
  let rings='';[0.34,0.67,1].forEach(f=>{const p=TYPES.map((_,i)=>pt(i,R*f).join(',')).join(' ');rings+=`<polygon points="${p}" fill="none" stroke="rgba(255,255,255,.10)"/>`;});
  let axes='',labels='';
  TYPES.forEach((t,i)=>{const[x,y]=pt(i,R);axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,.10)"/>`;
    const[lx,ly]=pt(i,R+16);labels+=`<text x="${lx}" y="${ly}" font-size="10" fill="#a99fd6" text-anchor="middle" dominant-baseline="middle" font-family="Nunito,sans-serif">${t}</text>`;});
  const poly=TYPES.map((t,i)=>{const m=P.mind[t];const acc=m&&m.t?m.c/m.t:0;const r=12+acc*(R-12);return pt(i,m&&m.t?r:12).join(',');}).join(' ');
  return `<svg viewBox="0 0 220 210" style="width:100%;max-width:300px;display:block;margin:0 auto">${rings}${axes}
    <polygon points="${poly}" fill="rgba(255,180,61,.22)" stroke="var(--lantern)" stroke-width="2"/>
    ${TYPES.map((t,i)=>{const m=P.mind[t];const acc=m&&m.t?m.c/m.t:0;const[x,y]=pt(i,m&&m.t?12+acc*(R-12):12);return `<circle cx="${x}" cy="${y}" r="3" fill="var(--lantern-soft)"/>`;}).join('')}
    ${labels}</svg>`;
}

function answer(i){

// ===================== EXPEDITION =====================
function startExpedition(){S.exp={n:0,lives:3,score:0,streak:0,mult:1,cur:null,lastIdx:-1,locked:false,seenRun:new Set()};go('expedition');}
function nextExp(){const pool=expPool();const E=S.exp;const cap=Math.min(6,1+Math.floor(E.n/2)),lo=Math.max(1,cap-2);
  P.seen.exp=P.seen.exp||{};
  const inWin=i=>pool[i].tier<=cap&&pool[i].tier>=lo;
  let elig=[];for(let i=0;i<pool.length;i++)if(inWin(i)&&!E.seenRun.has(i)&&!P.seen.exp[i])elig.push(i);          // fresh this run AND recently
  if(!elig.length)for(let i=0;i<pool.length;i++)if(inWin(i)&&!E.seenRun.has(i))elig.push(i);                     // at least not repeated this run
  if(!elig.length)for(let i=0;i<pool.length;i++)if(inWin(i))elig.push(i);                                       // last resort
  const idx=elig[Math.floor(Math.random()*elig.length)];
  E.seenRun.add(idx);P.seen.exp[idx]=1;
  if(Object.keys(P.seen.exp).length>pool.length*0.7)P.seen.exp={};                                              // recycle once most are used
  Store.save();E.lastIdx=idx;return {q:prepQ(pool[idx].q),tier:pool[idx].tier};}
function hearts(n){return '❤️'.repeat(n)+'🖤'.repeat(3-n);}
function screenExpedition(){
  const E=S.exp;if(!E.cur)E.cur=nextExp();E.locked=false;const q=E.cur.q;

    <div class="timer" id="timerWrap"><i id="timerFill"></i></div>
    <div class="qcard"><span class="qtype" style="background:${TYPE_COLOR[q.t]}">${q.t} · tier ${E.cur.tier}</span>
      <p class="qtext">${q.q}</p>${q.v?`<div class="qvisual">${q.v}</div>`:''}
      <div class="opts" id="opts"></div><div id="afterwrap"></div></div>`;
  const opts=$('opts');q.o.forEach((o,i)=>{const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<span class="key">${String.fromCharCode(65+i)}</span><span>${o}</span>`;b.onclick=()=>expAnswer(i);opts.appendChild(b);});
  startTimer(15000,()=>expAnswer(-1));
}
function expAnswer(i){
  const E=S.exp;if(E.locked)return;E.locked=true;clearTimer();
  const q=E.cur.q,correct=i===q.a;
  addMind(q.t,correct);
  if(correct){E.streak++;E.mult=E.streak>=6?3:E.streak>=3?2:1;E.score+=10*E.mult;SFX.correct();}
  else{E.lives--;E.streak=0;E.mult=1;SFX.wrong();}
  [...$('opts').children].forEach((b,idx)=>{b.disabled=true;if(idx===q.a)b.classList.add('correct');if(idx===i&&!correct)b.classList.add('wrong');});
  const dead=E.lives<=0;
  const verdict=i===-1?'⏰ Time!':(correct?`✓ +${10*E.mult}`:'✗ Lost a life');
  $('afterwrap').innerHTML=`<div class="explain"><div class="verdict ${correct?'yes':'no'}">${verdict}</div>${q.e}</div>
    <div class="qfoot"><button class="next" id="nextBtn">${dead?'See how far you got':'Keep going'} ›</button></div>`;
  $('nextBtn').onclick=()=>{SFX.click();if(dead){go('expresults');}else{E.n++;E.cur=null;render();}};

function screenResults(){
  const Q=S.quiz,total=S.answers.length,score=S.answers.filter(a=>a.correct).length,pct=Math.round(score/total*100),passed=score/total>=PASS;
  sub.textContent=Q.title+' · results';

  let tier,msg;

  else if(passed){tier='Nicely reasoned';msg=kid?'You worked out most of them. The tricky ones are how thinking grows.':'Solid reasoning. The misses below are where sharpening happens.';}
  else {tier='Good try — give it another go';msg=kid?'This one needs a little more thinking — read the explanations and try again!':'A few slipped past. The explanations above are the workout.';}

  const rb=$('rb');

// --- Quick Tap ---
function playTap(){const A=S.arc;A.score=0;A.left=30;
  app.innerHTML=arcHUD('⚡ Quick Tap','★ 0')+`<div class="qcard"><p class="qtext" id="tapPrompt" style="text-align:center"></p><div class="opts" id="tapOpts" style="margin-top:14px"></div></div>`;
  nextTap();
  A.tm=aI(()=>{A.left-=0.1;const f=Math.max(0,A.left/30);const bar=$('arcFill');if(bar)bar.style.width=(f*100)+'%';
    if(A.left<=0){clearArc();finishArc('tap','Quick Tap','var(--lantern)',Math.round(A.score),A.score+' points');}},100);}
function nextTap(){const A=S.arc;const t=['big','small','sum','odd'][Math.floor(Math.random()*4)];let prompt,opts,correct;
  if(t==='big'||t==='small'){const ns=[];while(ns.length<4){const v=1+Math.floor(Math.random()*99);if(!ns.includes(v))ns.push(v);}correct=t==='big'?Math.max(...ns):Math.min(...ns);prompt=t==='big'?'Tap the BIGGEST number':'Tap the SMALLEST number';opts=ns.map(v=>({label:String(v),val:v}));}
  else if(t==='sum'){const a=2+Math.floor(Math.random()*9),b=2+Math.floor(Math.random()*9);correct=a+b;prompt=`What is ${a} + ${b}?`;const set=new Set([correct]);while(set.size<4){const d=correct+(Math.floor(Math.random()*9)-4);if(d>0)set.add(d);}opts=shuffle([...set].map(v=>({label:String(v),val:v})));}
  else{const cols=['var(--leaf)','var(--sky)','var(--berry)','var(--lantern)','var(--grape)'];const base=cols[Math.floor(Math.random()*cols.length)];let other=base;while(other===base)other=cols[Math.floor(Math.random()*cols.length)];const odd=Math.floor(Math.random()*4);prompt='Tap the DIFFERENT colour';opts=[0,1,2,3].map(i=>({color:i===odd?other:base,val:i}));correct=odd;}
  A.round={correct};
  $('tapPrompt').textContent=prompt;const w=$('tapOpts');w.innerHTML='';
  opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.style.justifyContent='center';
    b.innerHTML=o.color!==undefined?`<span style="display:inline-block;width:32px;height:32px;border-radius:50%;background:${o.color}"></span>`:`<span style="font-size:20px;font-weight:700">${o.label}</span>`;
    b.onclick=()=>tapAns(o.val);w.appendChild(b);});}
function tapAns(v){const A=S.arc;if(v===A.round.correct){A.score+=10;SFX.correct();const r=$('arcRight');if(r)r.textContent='★ '+A.score;}else{SFX.wrong();A.left=Math.max(0.1,A.left-2);}nextTap();}

// --- Memory Match ---
function playMatch(){const A=S.arc;const set=['🦊','🐢','🦉','🐝','🦋','🐙'];
  A.deck=shuffle(set.concat(set).map(e=>({e,flipped:false,matched:false})));A.first=null;A.moves=0;A.lock=false;A.done=0;A.start=Date.now();
  app.innerHTML=arcHUD('🃏 Memory Match','moves 0')+`<div class="qcard"><div id="matchGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"></div></div>`;
  drawMatch();}
function drawMatch(){const A=S.arc;const g=$('matchGrid');if(!g)return;g.innerHTML='';
  A.deck.forEach((c,idx)=>{const b=document.createElement('button');b.className='matchcard'+((c.flipped||c.matched)?' up':'')+(c.matched?' done':'');
    b.textContent=(c.flipped||c.matched)?c.e:'';b.onclick=()=>flipCard(idx);g.appendChild(b);});
  const r=$('arcRight');if(r)r.textContent='moves '+A.moves;}
function flipCard(idx){const A=S.arc;const c=A.deck[idx];if(A.lock||c.matched||c.flipped)return;c.flipped=true;
  if(A.first===null){A.first=idx;drawMatch();return;}
  A.moves++;const fr=A.deck[A.first];drawMatch();
  if(fr.e===c.e){fr.matched=c.matched=true;A.first=null;A.done+=2;SFX.correct();drawMatch();
    if(A.done===A.deck.length){const sec=Math.round((Date.now()-A.start)/1000);finishArc('match','Memory Match','var(--sky)',Math.max(100,1200-A.moves*15-sec*4),A.moves+' moves · '+sec+'s');}}
  else{A.lock=true;SFX.wrong();aT(()=>{fr.flipped=false;c.flipped=false;A.first=null;A.lock=false;drawMatch();},750);}}

const SIMON_PADS=[{c:'var(--leaf)',f:330},{c:'var(--sky)',f:440},{c:'var(--berry)',f:550},{c:'var(--lantern)',f:660}];
function playSimon(){const A=S.arc;A.seq=[];A.input=0;A.phase='show';
  app.innerHTML=arcHUD('🎵 Echo','round 0')+`<div class="qcard"><div id="simonGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:280px;margin:0 auto"></div><p id="simonMsg" style="text-align:center;color:var(--muted);margin-top:14px">Watch the pattern…</p></div>`;
  const g=$('simonGrid');SIMON_PADS.forEach((p,i)=>{const b=document.createElement('button');b.className='simonpad';b.id='pad'+i;b.style.background=p.c;b.onclick=()=>simonTap(i);g.appendChild(b);});
  nextSimon();}
function flashPad(i,cb){const el=$('pad'+i);if(el){el.classList.add('lit');tone(SIMON_PADS[i].f,0,.3,'sine',.2);}aT(()=>{if(el)el.classList.remove('lit');cb&&cb();},340);}
function nextSimon(){const A=S.arc;A.seq.push(Math.floor(Math.random()*4));A.input=0;A.phase='show';
  const r=$('arcRight');if(r)r.textContent='round '+A.seq.length;const m=$('simonMsg');if(m)m.textContent='Watch the pattern…';
  let k=0;const step=()=>{if(k>=A.seq.length){A.phase='input';const mm=$('simonMsg');if(mm)mm.textContent='Your turn!';return;}flashPad(A.seq[k],()=>{k++;aT(step,170);});};aT(step,500);}
function simonTap(i){const A=S.arc;if(A.phase!=='input')return;flashPad(i);
  if(i===A.seq[A.input]){A.input++;if(A.input===A.seq.length){A.phase='wait';const m=$('simonMsg');if(m)m.textContent='Nice!';aT(nextSimon,650);}}
  else{SFX.wrong();finishArc('simon','Echo','var(--berry)',Math.max(0,(A.seq.length-1)*20),'reached round '+A.seq.length);}}

function playSpell(){const R=S.read;const word=R.words[R.i];R.target=word.w.toUpperCase();

  const others=shuffle(WORDS.filter(x=>x.w!==word.w)).slice(0,3);const opts=shuffle([word,...others]);
  app.innerHTML=readHUD('Read & find',R.i,R.words.length)+`<div class="qcard">
    <p style="text-align:center;color:var(--muted);margin:0 0 6px">Read the word, then tap its picture</p>
    <div class="bigword">${word.w}</div>
    <div style="text-align:center;margin:10px 0"><button class="spk" id="spk">🔊</button></div>
    <div class="picopts" id="pic"></div></div>`;
  const w=$('pic');opts.forEach(o=>{const b=document.createElement('button');b.className='picopt';b.textContent=o.e;b.onclick=()=>matchAns(o,word,b);w.appendChild(b);});
  $('spk').onclick=()=>speak(word.w);
}
function matchAns(o,word,btn){const R=S.read;if(o.w===word.w){SFX.correct();speak(word.w);R.score++;aT(nextRead,800);}
  else{SFX.wrong();btn.style.opacity='.4';btn.disabled=true;}}
// result
function finishReading(score,total,mode){const xp=score*5;const prev=levelFor(P.xp);P.xp+=xp;const nl=levelFor(P.xp);
  const newB=[];if(award('reader'))newB.push('reader');if(P.xp>=500&&award('brainiac'))newB.push('brainiac');Store.save();
  S.readResult={score,total,xp,mode,leveled:nl>prev,newLevel:nl,newB};go('readresult');}
function screenReadResult(){const R=S.readResult;sub.textContent='Reading Club · results';
  const verb=R.mode==='spell'?'spelled':'read';
  app.innerHTML=`<div class="res"><div class="qtype" style="background:var(--grape)">Reading Club</div>
    <div class="scorebig">${R.score}<small>/${R.total}</small></div>
    <div class="restier">Great reading! 📖</div>
    <p class="resmsg">You ${verb} ${R.score} of ${R.total} words. Every word you sound out makes reading easier.</p>
    <div class="unlock" style="border-color:var(--grape)">+${R.xp} XP</div>
    <div class="resbtns" id="rb"></div></div>`;
  const rb=$('rb');mkBtn(rb,'↺ Play again',true,()=>startReading(R.mode));mkBtn(rb,'Reading Club',false,()=>go('reading'));mkBtn(rb,'The path',false,()=>{S.audience='child';go('cats');});
  setTimeout(()=>{if(R.leveled){confetti(110);SFX.level();showModal(`<div class="big">⭐</div><h2>Level ${R.newLevel}!</h2><p>You crossed ${R.newLevel*100} XP.</p><button class="btn" data-close>Nice!</button>`);}
    else if(R.newB.length){const b=badgeDef(R.newB[0]);confetti(90);SFX.star();showModal(`<div class="big">${b.ic}</div><h2>Badge unlocked!</h2><p><b>${b.n}</b> — ${b.d}</p><button class="btn" data-close>Collect</button>`);}
    else{confetti(60);SFX.star();}},360);
}

(async()=>{const saved=await Store.load();if(saved)P=Object.assign(defaultProfile(),saved,{settings:Object.assign({sound:true,timed:false},saved.settings||{}),mind:saved.mind||{},seen:saved.seen||{},arcade:saved.arcade||{}});
  if(!P.name)go('welcome');else go('home');})();
</script>
